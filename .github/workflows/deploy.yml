name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-push-update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Checkout
      - uses: actions/checkout@v4

      # Setup Node
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      # Install + test
      - run: npm install
      - run: npm test

      # Docker login
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build image
      - run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/product-service:${{ github.sha }} .

      # Push image
      - run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/product-service:${{ github.sha }}

      # Update Kubernetes manifest
      - run: |
          sed -i "s|image: .*product-service.*|image: ${{ secrets.DOCKER_USERNAME }}/product-service:${{ github.sha }}|g" templates/deployment.yaml

      # Commit changes
      - run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Update image to ${{ github.sha }}" || echo "No changes"
          git push